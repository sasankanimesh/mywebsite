<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker-Themed Personal Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: #00FF00;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #111;
      padding: 20px;
      color: #00FFFF;
    }
    header h2 {
      margin: 0;
      font-size: 2rem;
    }
    .header-links a {
      color: #00FFFF;
      text-decoration: none;
      margin: 0 10px;
      font-size: 16px;
      border: 1px solid #00FFFF;
      padding: 5px 10px;
      transition: all 0.3s;
    }
    .header-links a:hover {
      background-color: #00FFFF;
      color: #000;
    }
    nav {
      display: flex;
      justify-content: center;
      background-color: #111;
      padding: 20px;
    }
    nav a {
      color: #00FFFF;
      text-decoration: none;
      margin: 0 15px;
      font-size: 20px;
      padding: 5px 10px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    nav a:hover {
      border-color: #00FFFF;
      background-color: #222;
    }
    section {
      display: none;
      padding: 50px;
      text-align: center;
    }
    section.active {
      display: block;
    }
    h1 {
      text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00;
      margin-bottom: 30px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .whoami-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }
    .cmd-simulation {
      background-color: #111;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px #00FF00;
      text-align: left;
      font-size: 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      color: #00FF00;
      flex: 1 1 300px;
    }
    #whoami-photo {
      border: 3px solid #00FFFF;
      border-radius: 10px;
      width: 300px;
      height: auto;
      flex: 1 1 300px;
    }
    #whoami-video {
      border: 3px solid #00FFFF;
      border-radius: 10px;
      width: 300px;
      height: auto;
      flex: 1 1 300px;
    }
    @media (max-width: 600px) {
      nav a {
        font-size: 16px;
        padding: 5px;
      }
      .whoami-content {
        flex-direction: column;
      }
    }
  </style>
  <script>
    function showSection(id) {
      // Hide all sections
      const sections = document.querySelectorAll('section');
      sections.forEach(section => section.classList.remove('active'));

      // Show the selected section
      document.getElementById(id).classList.add('active');
    }

    function typeEffect(element, text, delay = 100) {
      let index = 0;
      function type() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          setTimeout(type, delay);
        }
      }
      type();
    }

    function loadWhoamiContent() {
      const cmdOutput = document.getElementById('cmd-output');
      const outputText = "whoami\nCybersecurity Enthusiast\nPenetration Tester\nDeveloper | Problem Solver | Hacker at Heart\n";
      
      // Clear the content to prevent duplicate text
      cmdOutput.textContent = "";
      
      // Start typing effect
      typeEffect(cmdOutput, outputText, 80);
    }
  </script>
</head>
<body>
  <header>
    <h2>My Hacker-Themed Website</h2>
    <div class="header-links">
      <a href="resume.pdf" download="My_Resume.pdf">Download Resume</a>
      <a href="https://www.linkedin.com/in/your-profile" target="_blank">LinkedIn</a>
      <a href="https://tryhackme.com/p/your-username" target="_blank">TryHackMe</a>
    </div>
    <nav>
      <a href="#" onclick="showSection('whoami'); loadWhoamiContent();">Whoami</a>
      <a href="#" onclick="showSection('projects')">Projects</a>
      <a href="#" onclick="showSection('experience')">Experience</a>
    </nav>
  </header>

  <section id="whoami" class="active">
    <h1>Who Am I?</h1>
    <div class="whoami-content">
      <div class="cmd-simulation" id="cmd-output"></div>
      <img id="whoami-photo" src="your-photo.jpg" alt="Whoami Photo">
      <video id="whoami-video" controls>
        <source src="your-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </section>
  <section id="projects">
    <h1>Projects</h1>
    <p>Here are some of the projects I've worked on:</p>
    <!-- Add project details here -->
  </section>
  <section id="experience">
    <h1>Experience</h1>
    <p>Details about my work experience.</p>
  </section>
</body>
</html>
