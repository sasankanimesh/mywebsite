<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Personal Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* Existing styles */
    body {
      background-color: #000;
      color: #00FF00;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #111;
      padding: 20px;
      color: #00FFFF;
      z-index: 1000;
    }

    header h2 {
      font-size: 24px;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      color: #00FFFF;
      text-decoration: none;
      margin: 0 15px;
      font-size: 20px;
      padding: 5px 10px;
      border: 1px solid transparent;
      transition: all 0.3s;
      cursor: pointer;
    }

    nav a:hover {
      border-color: #00FFFF;
      background-color: #222;
    }

    .header-links a {
      color: #00FFFF;
      text-decoration: none;
      margin: 0 10px;
      font-size: 16px;
      border: 1px solid #00FFFF;
      padding: 5px 10px;
      transition: all 0.3s;
    }

    .header-links a:hover {
      background-color: #00FFFF;
      color: #000;
    }

    section {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00;
      margin-bottom: 30px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .whoami-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }

    .cmd-simulation {
      background-color: #111;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px #00FF00;
      text-align: left;
      font-size: 18px;
      white-space: pre-wrap;
      line-height: 1.5;
      color: #00FF00;
      flex: 1 1 300px;
    }

    #whoami-photo {
      border: 3px solid #00FFFF;
      border-radius: 10px;
      width: 300px;
      height: auto;
      flex: 1 1 300px;
    }

    #whoami-video {
      border: 3px solid #00FFFF;
      border-radius: 10px;
      width: 300px;
      height: auto;
      flex: 1 1 300px;
    }

    /* Mobile view styles */
    @media (max-width: 600px) {
      header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 15px;
      }

      header h2 {
        font-size: 18px;
        margin-left: 10px;
      }

      nav {
        display: none;
        width: 100%;
        justify-content: space-around;
        margin-top: 15px;
        flex-direction: column;
      }

      nav a {
        font-size: 16px;
        padding: 8px 15px;
        width: 100%;
        text-align: center;
      }

      .header-links {
        display: none;
        flex-direction: column;
        width: 100%;
        margin-top: 15px;
      }

      .header-links a {
        font-size: 14px;
        padding: 8px;
        width: 100%;
      }

      .whoami-content {
        flex-direction: column;
      }

      #whoami-photo, #whoami-video {
        width: 100%;
        max-width: 300px;
      }

      section {
        padding: 50px 10px;
      }

      h1 {
        font-size: 24px;
      }

      p, ul {
        font-size: 16px;
        padding: 0 10px;
      }

      img, video {
        max-width: 100%;
        height: auto;
      }

      .hamburger {
        display: block;
        cursor: pointer;
        position: absolute;
        right: 20px;
        top: 20px;
        width: 30px;
        height: 20px;
        flex-direction: column;
        justify-content: space-between;
        background-color: transparent;
        border: none;
        z-index: 1001;
      }

      .hamburger div {
        width: 100%;
        height: 4px;
        background-color: #00FFFF;
      }

      .hamburger.open + nav,
      .hamburger.open + nav + .header-links {
        display: flex;
      }

      /* Hamburger panel style */
      .hamburger-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 75%;
        height: 100%;
        background-color: #111;
        padding: 20px;
        z-index: 1000;
        display: none;
        flex-direction: column;
        align-items: flex-start;
      }

      .hamburger-panel.open {
        display: flex;
      }

      .hamburger-panel a {
        color: #00FFFF;
        text-decoration: none;
        margin: 10px 0;
        font-size: 18px;
        padding: 10px;
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        transition: all 0.3s;
      }

      .hamburger-panel a:hover {
        background-color: #00FFFF;
        color: #000;
      }
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {

      window.history.scrollRestoration = 'manual'; // Disable browser's automatic scroll restoration
      window.scrollTo(0, 0);

      // Initialize the "whoami" section CMD simulation
      loadWhoamiContent();

      // Set up smooth scrolling for all nav links without updating the URL
      document.querySelectorAll('nav a').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const sectionId = this.getAttribute('href').substring(1);
          document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
        });
      });

      // Handle hamburger menu toggle
      const hamburger = document.querySelector('.hamburger');
      const hamburgerPanel = document.querySelector('.hamburger-panel');
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        hamburgerPanel.classList.toggle('open');
      });
    });

    function typeEffect(element, text, delay = 100) {
      let index = 0;
      function type() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          setTimeout(type, delay);
        }
      }
      type();
    }

    function loadWhoamiContent() {
      const cmdOutput = document.getElementById('cmd-output');
      const outputText = "whoami\nCybersecurity Enthusiast\nPenetration Tester\nDeveloper | Problem Solver | Hacker at Heart\n";
      cmdOutput.textContent = ""; // Reset text
      typeEffect(cmdOutput, outputText, 80); // Type the effect
    }
  </script>
</head>
<body>
  <header>
    <h2>Sasanka Nimes</h2>
    <!-- Hamburger Menu -->
    <button class="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </button>
    <!-- Navigation for Desktop -->
    <nav>
      <a href="#whoami">Whoami</a>
      <a href="#projects">Projects</a>
      <a href="#experience">Experience</a>
      <a href="#certs">Certifications</a>
      <a href="#skills">Skills</a>
      <a href="#education">Education</a>
    </nav>
    <div class="header-links">
      <a href="resume.pdf" download="My_Resume.pdf">Download Resume</a>
      <a href="https://www.linkedin.com/in/your-profile" target="_blank">LinkedIn</a>
      <a href="https://tryhackme.com/p/your-username" target="_blank">TryHackMe</a>
    </div>
  </header>

  <!-- Hamburger Panel for Mobile -->
  <div class="hamburger-panel">
    <a href="#whoami">Whoami</a>
    <a href="#projects">Projects</a>
    <a href="#experience">Experience</a>
    <a href="#certs">Certifications</a>
    <a href="#skills">Skills</a>
    <a href="#education">Education</a>
    <a href="resume.pdf" download="My_Resume.pdf">Download Resume</a>
    <a href="https://www.linkedin.com/in/your-profile" target="_blank">LinkedIn</a>
    <a href="https://tryhackme.com/p/your-username" target="_blank">TryHackMe</a>
  </div>

  <section id="whoami">
    <h1>Whoami</h1>
    <div class="whoami-content">
      <div class="cmd-simulation" id="cmd-output"></div>
      <video id="whoami-video" controls>
        <source src="your-introduction-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <img id="whoami-photo" src="your-photo.jpg" alt="Your Photo">
    </div>
  </section>

  <!-- Other sections here (projects, experience, etc.) -->

</body>
</html>
